services:
  app:
    image: vuln:latest # built from Dockerfile.hardened
    build:
      context: .
      dockerfile: Dockerfile.hardened
    ports:
      - "5000:5000"

    # ── Runtime security controls ─────────────────────────────────────────────
    # These can't be set in a Dockerfile — they're enforced at container start.

    read_only: true                        # CG-011: no writable root filesystem
    user: "1000:1000"                      # CG-001: run as non-root (matches USER in Dockerfile.hardened)

    cap_drop:
      - ALL                               # CG-015: drop every capability by default
    cap_add:
      - NET_BIND_SERVICE                  # add back only what the app actually needs

    security_opt:
      - no-new-privileges:true            # prevent privilege escalation via setuid binaries

    deploy:
      resources:
        limits:
          memory: 512m                    # CG-013: cap memory (0 = unlimited = bad)
          cpus: "0.5"                     # CG-014: cap CPU

    # read_only: true breaks anything that writes to the fs at runtime.
    # Mount explicit tmpfs for paths the app needs to write to.
    tmpfs:
      - /tmp
      - /var/run

    healthcheck:                          # CG-005: so Docker can detect unhealthy containers
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    environment:
      - FLASK_ENV=production              # never set secrets here — use a secrets manager
